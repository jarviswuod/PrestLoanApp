services:
  mysql:
    image: mysql:8.4
    container_name: prestloan-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: prestloan
      MYSQL_USER: ${DB_USERNAME:-prestloan}
      MYSQL_PASSWORD: ${DB_PASSWORD:-prestloan}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
    ports:
      - "3306:3306"
    volumes:
      - prestloan_volume:/var/lib/mysql
    networks:
      - prestloan-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${DB_PASSWORD:-prestloan}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: prestloan-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_volume:/data
    networks:
      - prestloan-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: prestloan-app
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: ${DB_URL:-jdbc:mysql://mysql:3306/prestloan}
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME:-prestloan}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-prestloan}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_CACHE_TYPE: redis
      APP_SECURITY_USERNAME: ${APP_SECURITY_USERNAME:-admin}
      APP_SECURITY_PASSWORD: ${APP_SECURITY_PASSWORD:-change-me}
      APP_JWT_SECRET: ${APP_JWT_SECRET:-replace-with-strong-secret}
      APP_JWT_EXPIRATION_MINUTES: ${APP_JWT_EXPIRATION_MINUTES:-120}
    networks:
      - prestloan-network
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

networks:
  prestloan-network:
    driver: bridge

volumes:
  prestloan_volume:
  redis_volume: