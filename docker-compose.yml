services:
  mysql:
    image: mysql:8.4
    container_name: prestloan-mysql
    environment:
      MYSQL_DATABASE: prestloan
      MYSQL_USER: prestloan
      MYSQL_PASSWORD: prestloan
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-pprestloan"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - mysql_data:/var/lib/mysql

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: prestloan-api
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/prestloan
      SPRING_DATASOURCE_USERNAME: prestloan
      SPRING_DATASOURCE_PASSWORD: prestloan
    ports:
      - "8083:8083"

volumes:
  mysql_data:
